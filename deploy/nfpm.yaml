# nfpm config → .deb / .rpm for qoltanba (https://nfpm.goreleaser.com).
# BYOL: the Kalkan native library is NOT packaged — the operator supplies it.
# Build (VERSION without leading v, ARCH=amd64, and ./qoltanba binary present):
#   VERSION=1.2.3 ARCH=amd64 nfpm pkg --config deploy/nfpm.yaml --packager deb --target dist/
#   VERSION=1.2.3 ARCH=amd64 nfpm pkg --config deploy/nfpm.yaml --packager rpm --target dist/
name: qoltanba
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: qoltanba maintainers
description: |
  Thin, fast Go service over the proprietary Kalkan native library (RK / NUC eSign).
  Signs and verifies XML, CMS/PKCS#7 and WSSE, validates certificates (OCSP/CRL),
  builds chains and exhaustively extracts signer/key facts. The Kalkan library is
  Bring-Your-Own-Library and is not included in this package.
vendor: qoltanba
homepage: https://github.com/uelnur/qoltanba
license: See project license; bundled Kalkan library is BYOL and separate.

contents:
  - src: ./qoltanba
    dst: /usr/bin/qoltanba
    file_info:
      mode: 0755
  - src: deploy/packaging/qoltanba.service
    dst: /lib/systemd/system/qoltanba.service
  - src: deploy/qoltanba.env
    dst: /etc/qoltanba/qoltanba.env
    type: "config|noreplace"
    file_info:
      mode: 0640
  - src: deploy/config.example.yaml
    dst: /etc/qoltanba/config.example.yaml
  - src: api/openapi.yaml
    dst: /usr/share/qoltanba/openapi.yaml

scripts:
  postinstall: deploy/packaging/postinstall.sh
  preremove: deploy/packaging/preremove.sh
  postremove: deploy/packaging/postremove.sh

deb:
  fields:
    Bugs: https://github.com/uelnur/qoltanba/issues
