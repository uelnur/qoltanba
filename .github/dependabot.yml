version: 2
updates:
  # Go module dependencies — grouped into one weekly PR to cut review noise.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns:
          - "*"

  # Pinned action versions in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
