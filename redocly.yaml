# Redocly lint config for api/openapi.yaml (generated by tools/openapigen).
# Uses the recommended ruleset minus rules that do not fit the service's current
# reality — re-enable them as the API grows.
extends:
  - recommended
rules:
  # No auth scheme yet: the OIDC provider (roadmap bet #1) is not built. Turn this
  # back on once operations require security.
  security-defined: off
  # localhost is the honest self-hosted default server; not an example placeholder.
  no-server-example.com: off
  # Health/observability GETs have no meaningful 4xx.
  operation-4xx-response: off
