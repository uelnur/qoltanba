      - jobs
  /metrics:
    get:
      operationId: metrics
      responses:
        "200":
          description: Prometheus text exposition
      summary: Prometheus metrics
      tags:
      - observability
  /readyz:
    get:
      operationId: readyz
      responses:
        "200":
          description: ready
      summary: Readiness — library loaded and self-tested
      tags:
      - observability
  /sign:
    post:
      operationId: sign
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignResponse'
          description: Signature produced (check libError for a crypto-core failure)
        "400":
          $ref: '#/components/responses/Error'
        "500":
          $ref: '#/components/responses/Error'
        "503":
          $ref: '#/components/responses/Error'
      summary: Sign data (CMS / XML / WSSE)
      tags:
      - signature
  /sign/add:
    post:
      operationId: signAdd
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignResponse'
          description: Signature produced
        "400":
          $ref: '#/components/responses/Error'
        "500":
          $ref: '#/components/responses/Error'
        "503":
          $ref: '#/components/responses/Error'
      summary: Co-sign — add a signer to an already-signed container
      tags:
      - signature
  /sign/batch:
    post:
      operationId: signBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignBatchRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignBatchResponse'
          description: Per-item results in request order, plus a summary
        "400":
          $ref: '#/components/responses/Error'
        "500":
          $ref: '#/components/responses/Error'
        "503":
          $ref: '#/components/responses/Error'
      summary: 'Sign many items (aggregated JSON, or NDJSON stream with Accept: application/x-ndjson)'
      tags:
      - batch
  /statusz:
    get:
      operationId: statusz
      responses:
        "200":
          description: Status info
      summary: Non-sensitive service status (no secrets)
      tags:
      - observability
  /verify:
    post:
      operationId: verify
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
          description: Verification outcome (an invalid signature is valid=false +
