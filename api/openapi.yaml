      - signature
  /verify/batch:
    post:
      operationId: verifyBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyBatchRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyBatchResponse'
          description: Per-item results in request order, plus a summary
        "400":
          $ref: '#/components/responses/Error'
        "500":
          $ref: '#/components/responses/Error'
        "503":
          $ref: '#/components/responses/Error'
      summary: Verify many signatures
      tags:
      - batch
servers:
- description: Default REST work port (-http :8080)
